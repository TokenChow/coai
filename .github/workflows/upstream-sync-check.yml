# [COMMERCIAL] Check for upstream updates weekly
# This workflow only notifies - it does NOT auto-merge
name: Upstream Sync Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/coaidev/coai.git || true
          git fetch upstream main

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "## Upstream Updates Available" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**$BEHIND new commit(s)** from upstream:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Bridge File Changes" >> $GITHUB_STEP_SUMMARY
            for f in main.go app/src/router.tsx app/src/store/index.ts; do
              if git diff HEAD...upstream/main --name-only | grep -q "^${f}$"; then
                echo "- :warning: \`$f\` modified (potential conflict)" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run \`./scripts/upstream-sync.sh\` to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Up to Date" >> $GITHUB_STEP_SUMMARY
            echo "No new upstream commits." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue if behind
        if: steps.check.outputs.behind > 0
        uses: actions/github-script@v7
        with:
          script: |
            const behind = '${{ steps.check.outputs.behind }}';
            const title = `[Upstream Sync] ${behind} new commit(s) available`;
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['upstream-sync'],
                body: `Upstream has ${behind} new commit(s).\n\nRun \`./scripts/upstream-sync.sh\` locally to merge.\n\nThis issue will be auto-created weekly if upstream has updates.`,
              });
            }
